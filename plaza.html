<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContractBeat｜旋律广场</title>
  <meta name="description" content="ContractBeat 旋律广场：封面优先、移动端友好的作品流。" />
  <link rel="icon" type="image/webp" href="./assets/covers/logo.webp" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="plaza">
  <div class="site-noise"></div>
  <div class="ambient ambient-a"></div>
  <div class="ambient ambient-b"></div>
  <div class="ambient ambient-c"></div>

  <header class="site-header">
    <div class="shell nav-shell panel">
      <a class="brand" href="./index.html">
        <span class="brand-mark"><img src="./assets/covers/logo.webp" alt="ContractBeat logo" /></span>
        <span class="brand-text">CONTRACTBEAT</span>
      </a>
      <nav class="main-nav">
        <a href="./index.html">首页</a>
        <a href="./plaza.html">旋律广场</a>
        <a href="./index.html#workflow">使用说明</a>
        <a href="./plaza.html?mode=mine">我的作品</a>
      </nav>
      <div class="nav-actions">
        <button id="langToggle" class="icon-button" type="button">EN</button>
        <button class="button ghost" id="connectWalletEntryBtn" data-connect-wallet data-connected-href="./plaza.html?mode=mine" type="button">连接钱包</button>
      </div>
    </div>
  </header>

  <main class="shell page-main">
    <section class="plaza-hero reveal">
      <span class="eyebrow" id="plazaEyebrow">旋律广场</span>
      <h1 class="page-title" id="plazaTitle">作品流</h1>
      <p class="page-subtitle" id="plazaSubtitle">
        在这里浏览最新作品，进入详情，继续分享与发现。
      </p>
      <div class="segmented-row wrap" id="plazaModeTabs">
        <button class="seg-chip active" type="button" data-plaza-mode="public">最新发布</button>
        <button class="seg-chip" type="button" data-plaza-mode="mine">我的作品</button>
      </div>
    </section>

    <section class="plaza-grid reveal" id="plazaGrid">
      <article class="plaza-item panel tall">
        <div class="plaza-cover no-cover"><span>载入中</span></div>
        <div class="plaza-info">
          <span class="meta-pill">作品载入中</span>
          <h2>正在同步旋律广场</h2>
          <p>稍后这里会显示数据库里的生成记录与封面流。</p>
          <a class="text-link" href="./result.html">查看最近作品</a>
        </div>
      </article>
    </section>

    <div class="plaza-pagination reveal" id="plazaPagination"></div>
  </main>

  <footer class="site-footer">
    <div class="shell footer-inner">

      </div>
